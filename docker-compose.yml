name: foodrescue

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: foodrescue-nginx
    restart: always
    mem_limit: 64m
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - foodrescue-net
    logging: *default-logging

  backend:
    image: ${BACKEND_IMAGE:-your-dockerhub-username/foodrescue-be:latest}
    container_name: foodrescue-backend
    restart: always
    init: true
    mem_limit: 256m
    stop_grace_period: 30s
    env_file:
      - ./backend.env
    environment:
      JAVA_OPTS: -Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m -Djava.security.egd=file:/dev/./urandom
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - foodrescue-net
    logging: *default-logging

  mysql:
    image: mysql:8.0
    container_name: foodrescue-mysql
    restart: always
    mem_limit: 512m
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
      - --innodb-buffer-pool-size=64M
    env_file:
      - ./backend.env
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - foodrescue-net
    logging: *default-logging

networks:
  foodrescue-net:
    driver: bridge

volumes:
  mysql-data:
