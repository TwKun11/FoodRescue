spring.application.name=foodrescue-be
server.port=8080


spring.datasource.url=jdbc:mysql://localhost:3306/foodrescue?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=11111111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (d?ng cho ??ng nh?p/??ng k? sau n?y)
app.jwt.secret=FoodRescueJwtSecretKeyForAuthenticationChangeInProduction123456
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Mail - ch? ??c t? bi?n m?i tr??ng, kh?ng ghi m?t kh?u
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.verification.base-url=${VERIFICATION_BASE_URL:http://localhost:3000/verify-email}
app.reset-password.base-url=${RESET_PASSWORD_BASE_URL:http://localhost:3000/reset-password}

# Google OAuth - Client ID (cung gia tri voi NEXT_PUBLIC_GOOGLE_CLIENT_ID o frontend)
