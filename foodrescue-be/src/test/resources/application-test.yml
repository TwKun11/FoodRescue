spring:
  datasource:
    url: jdbc:h2:mem:foodrescue;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  mail:
    host: localhost
    port: 2525
    username: test@example.com
    password: test-password

server:
  port: 0

app:
  cors:
    allowed-origins: http://localhost:3000
  jwt:
    secret: test-secret-key-with-minimum-length
    expiration-ms: 60000
    refresh-expiration-ms: 120000
  verification:
    base-url: http://localhost:3000/verify-email
  reset-password:
    base-url: http://localhost:3000/reset-password
  google:
    client-id: test-google-client-id.apps.googleusercontent.com

cloudinary:
  cloud-name: test-cloud
  api-key: test-api-key
  api-secret: test-api-secret
