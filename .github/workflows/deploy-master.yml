name: Deploy Master

on:
  push:
    branches:
      - master

env:
  BACKEND_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/foodrescue-be
  FRONTEND_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/foodrescue-fe

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: foodrescue-be
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw -B test

  verify-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: foodrescue-fe
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: foodrescue-fe/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - verify-backend
      - verify-frontend
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: foodrescue-be
        run: chmod +x mvnw

      - name: Build backend artifact
        working-directory: foodrescue-be
        run: ./mvnw -B -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./foodrescue-be
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./foodrescue-fe
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.FRONTEND_IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: Prepare deploy directory on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p "${{ secrets.EC2_DEPLOY_PATH }}/nginx"

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ secrets.EC2_DEPLOY_PATH }}
          overwrite: true

      - name: Upload nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: nginx/default.conf
          target: ${{ secrets.EC2_DEPLOY_PATH }}
          overwrite: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          BACKEND_IMAGE_NAME: ${{ env.BACKEND_IMAGE_NAME }}
          FRONTEND_IMAGE_NAME: ${{ env.FRONTEND_IMAGE_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,BACKEND_IMAGE_NAME,FRONTEND_IMAGE_NAME,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,EC2_DEPLOY_PATH
          script: |
            set -euo pipefail
            mkdir -p "$EC2_DEPLOY_PATH/nginx"
            cd "$EC2_DEPLOY_PATH"
            mv docker-compose.yml compose.prod.yml
            cat > .deploy.env <<EOF
            BACKEND_IMAGE=${BACKEND_IMAGE_NAME}:${IMAGE_TAG}
            FRONTEND_IMAGE=${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}
            EOF
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker compose --env-file .deploy.env -f compose.prod.yml pull
            docker compose --env-file .deploy.env -f compose.prod.yml up -d --remove-orphans
            docker image prune -af --filter "until=168h" || true
