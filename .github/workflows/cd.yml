name: FoodRescue CD

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ===== BACKEND BUILD =====
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Backend JAR
        run: |
          cd foodrescue-be
          mvn clean package -DskipTests

      # ===== DOCKER LOGIN =====
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ===== BUILD & PUSH BACKEND =====
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./foodrescue-be
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/foodrescue-be:latest

      # ===== BUILD & PUSH FRONTEND =====
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./foodrescue-fe
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/foodrescue-fe:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/foodrescue
            docker compose pull
            docker compose up -d
